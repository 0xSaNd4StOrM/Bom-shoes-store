# For details on every field, see https://supabase.com/docs/guides/local-development/cli/config
# ponytail: only the sections this project actually needs are un-commented in
# detail (auth email/smtp, templates, functions verify_jwt); everything else
# is the standard `supabase init` baseline.

project_id = "bom-store"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

# Local-only inbox for emails sent during `supabase start` / `functions serve`.
# Real signup/recovery emails go out via [auth.email.smtp] below instead once
# that section's `enabled = true`.
[local_smtp]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["https://127.0.0.1:5173"]
jwt_expiry = 3600
enable_signup = true

# Custom SMTP so signup-confirmation / password-recovery emails actually send
# (Supabase's built-in mailer is heavily rate-limited and dev-only).
# RESEND_API_KEY must be set wherever this config is loaded (see
# supabase/functions/.env.example) -- it's used both as the SMTP password
# here and as the Resend API key in the edge functions.
[auth.email.smtp]
enabled = true
host = "smtp.resend.com"
port = 587
user = "resend"
pass = "env(RESEND_API_KEY)"
admin_email = "support@bomstore.com"
sender_name = "BOM Store"

[auth.email.template.confirmation]
subject = "Confirm your BOM Store account"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your BOM Store password"
content_path = "./supabase/templates/recovery.html"

[functions.create-order]
# Default (true): the anon-key frontend client calls this, and the anon key
# itself is a valid JWT, so this still works for guests -- it just rejects
# requests with no Supabase JWT at all.
enabled = true
verify_jwt = true

[functions.kashier-webhook]
# Kashier's servers call this directly with no Supabase JWT, so JWT
# verification must be off. Authenticity is instead checked inside the
# function via the x-kashier-signature header (HMAC-SHA256, see
# supabase/functions/kashier-webhook/index.ts).
enabled = true
verify_jwt = false

[functions.sitemap]
# Search-engine crawlers request this directly with no Supabase JWT (same as
# robots.txt), so JWT verification must be off.
enabled = true
verify_jwt = false
