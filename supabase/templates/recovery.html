<!doctype html>
<html>
  <body style="margin:0;padding:0;background:#f4f4f2;font-family:Georgia,'Times New Roman',serif;color:#1a1a1a;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f2;padding:32px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background:#ffffff;border:1px solid #e5e5e0;max-width:480px;width:100%;">
            <tr>
              <td style="padding:32px 32px 16px;text-align:center;letter-spacing:2px;text-transform:uppercase;font-size:13px;color:#888;">
                BOM Store
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px 24px;text-align:center;">
                <h1 style="font-size:24px;font-weight:normal;margin:0 0 12px;">Reset your password</h1>
                <p style="font-size:14px;color:#555;line-height:1.6;margin:0;">
                  We received a request to reset your BOM Store password. Follow the link below to choose a new one.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:8px 32px 32px;text-align:center;">
                <a href="{{ .ConfirmationURL }}"
                   style="display:inline-block;background:#1a1a1a;color:#ffffff;text-decoration:none;padding:14px 28px;font-size:13px;letter-spacing:1px;text-transform:uppercase;">
                  Reset password
                </a>
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px 32px;text-align:center;font-size:12px;color:#999;">
                If you didn't request this, you can safely ignore this email -- your password won't change.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
